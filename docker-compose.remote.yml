version: '3.8'

services:
  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - /data/models:/root/.cache/huggingface
    command:
      - --model
      - Qwen/Qwen2.5-7B-Instruct
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.8"
      - --max-model-len
      - "4096"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  comfyui:
    image: ghcr.io/nvidia/cuda:11.8.0-devel-ubuntu22.04
    restart: unless-stopped
    ports:
      - "8188:8188"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - /data/ComfyUI:/ComfyUI
      - /data/models:/ComfyUI/models
      - /data/outputs:/ComfyUI/output
    working_dir: /ComfyUI
    command: >
      bash -c "
      apt-get update -qq &&
      apt-get install -y -qq python3-pip git &&
      pip install -q torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118 &&
      pip install -q -r requirements.txt &&
      python main.py --listen 0.0.0.0 --port 8188
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
