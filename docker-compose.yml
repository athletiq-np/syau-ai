services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: syau
      POSTGRES_PASSWORD: syau
      POSTGRES_DB: syau
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syau"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./.docker-data/redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-changeme}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_also}
    volumes:
      - ./.docker-data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./.docker-data/models:/data/models
      - ./.docker-data/outputs:/data/outputs
      - ./.docker-data/cache:/data/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    tmpfs:
      - /app/.next

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  worker-image:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: celery -A workers.celery_app worker -Q image -c 1 -n image@%h --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./.docker-data/models:/data/models
      - ./.docker-data/outputs:/data/outputs
      - ./.docker-data/cache:/data/cache

  worker-video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: celery -A workers.celery_app worker -Q video -c 1 -n video@%h --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./.docker-data/models:/data/models
      - ./.docker-data/outputs:/data/outputs
      - ./.docker-data/cache:/data/cache

  worker-chat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: celery -A workers.celery_app worker -Q chat -c 1 -n chat@%h --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./.docker-data/models:/data/models
      - ./.docker-data/outputs:/data/outputs
      - ./.docker-data/cache:/data/cache

  worker-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: celery -A workers.celery_app worker -Q studio -c 1 -n studio@%h --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./.docker-data/models:/data/models
      - ./.docker-data/outputs:/data/outputs
      - ./.docker-data/cache:/data/cache

  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./.docker-data/vllm-models:/root/.cache/huggingface
    command:
      - --model
      - Qwen/Qwen2.5-7B-Instruct
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.8"
      - --max-model-len
      - "4096"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  comfyui:
    image: ghcr.io/nvidia/cuda:11.8.0-devel-ubuntu22.04
    restart: unless-stopped
    ports:
      - "8188:8188"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./.docker-data/comfyui:/ComfyUI
      - ./.docker-data/comfyui-models:/ComfyUI/models
      - ./.docker-data/comfyui-outputs:/ComfyUI/output
    working_dir: /ComfyUI
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y python3-pip git &&
      if [ ! -d '.git' ]; then git clone https://github.com/comfyanonymous/ComfyUI.git . ; fi &&
      pip install -q torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118 &&
      pip install -q -r requirements.txt &&
      python main.py --listen 0.0.0.0 --port 8188
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: syauai-network
